<!DOCTYPE html>
<html>
<head>
	<title>Class 10th Study Materials</title>
</head>
<body>
	<h1>Get Study Materials</h1>
	<form id="form">
		<label>Email:</label>
		<input type="email" id="email" required><br><br>
		<label>Mobile Number:</label>
		<input type="number" id="mobile" required><br><br>
		<button>Submit</button>
	</form>
	<p id="msg"></p>

	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
		import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

		const firebaseConfig = {
			apiKey: "YOUR_API_KEY",
			authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
			projectId: "YOUR_PROJECT_ID",
			storageBucket: "YOUR_PROJECT_ID.appspot.com",
			messagingSenderId: "YOUR_SENDER_ID",
			appId: "YOUR_APP_ID"
		};

		const app = initializeApp(firebaseConfig);
		const db = getFirestore(app);

		document.getElementById('form').addEventListener('submit', async (e) => {
			e.preventDefault();
			const email = document.getElementById('email').value;
			const mobile = document.getElementById('mobile').value;
			try {
				await addDoc(collection(db, 'users'), { email, mobile });
				document.getElementById('msg').innerText = 'Materials will be sent soon!';
			} catch (err) {
				console.error(err);
			}
		});
	</script>
</body>
</html>
